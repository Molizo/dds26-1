apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: order-worker-rabbitmq-scaler
spec:
  scaleTargetRef:
    name: order-worker-deployment
  pollingInterval: 2
  cooldownPeriod: 45
  minReplicaCount: 4
  maxReplicaCount: 24
  triggers:
    - type: rabbitmq
      metadata:
        protocol: amqp
        mode: QueueLength
        host: amqp://dds:dds-rabbit@rabbitmq.default.svc.cluster.local:5672/%2F
        queueName: checkout.command.q
        value: "3"
    - type: rabbitmq
      metadata:
        protocol: amqp
        mode: QueueLength
        host: amqp://dds:dds-rabbit@rabbitmq.default.svc.cluster.local:5672/%2F
        queueName: order.command.q
        value: "3"
---
