name: dds26-medium

services:
  gateway:
    image: nginx:1.25-bookworm
    restart: unless-stopped
    volumes:
      - ./docker/nginx/gateway.scaled.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - order-service
      - stock-service
      - payment-service

  rabbitmq:
    image: haproxy:2.9-alpine
    restart: unless-stopped
    volumes:
      - ./docker/rabbitmq/haproxy-5nodes.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "5672:5672"
      - "15672:15672"
    depends_on:
      rabbitmq1:
        condition: service_healthy
      rabbitmq2:
        condition: service_healthy
      rabbitmq3:
        condition: service_healthy
      rabbitmq4:
        condition: service_healthy
      rabbitmq5:
        condition: service_healthy

  rabbitmq1:
    image: rabbitmq:3-management
    restart: unless-stopped
    hostname: rabbitmq1
    environment:
      RABBITMQ_ERLANG_COOKIE: dds26-rabbitmq-cluster
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - ./docker/rabbitmq/cluster-entrypoint.sh:/usr/local/bin/cluster-entrypoint.sh:ro
      - rabbitmq1-data:/var/lib/rabbitmq
      - rabbitmq1-logs:/var/log/rabbitmq
    entrypoint: ["/bin/sh", "/usr/local/bin/cluster-entrypoint.sh"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq2:
    image: rabbitmq:3-management
    restart: unless-stopped
    hostname: rabbitmq2
    environment:
      RABBITMQ_ERLANG_COOKIE: dds26-rabbitmq-cluster
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
      JOIN_CLUSTER_HOST: rabbitmq1
    volumes:
      - ./docker/rabbitmq/cluster-entrypoint.sh:/usr/local/bin/cluster-entrypoint.sh:ro
      - rabbitmq2-data:/var/lib/rabbitmq
      - rabbitmq2-logs:/var/log/rabbitmq
    entrypoint: ["/bin/sh", "/usr/local/bin/cluster-entrypoint.sh"]
    depends_on:
      rabbitmq1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq3:
    image: rabbitmq:3-management
    restart: unless-stopped
    hostname: rabbitmq3
    environment:
      RABBITMQ_ERLANG_COOKIE: dds26-rabbitmq-cluster
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
      JOIN_CLUSTER_HOST: rabbitmq1
    volumes:
      - ./docker/rabbitmq/cluster-entrypoint.sh:/usr/local/bin/cluster-entrypoint.sh:ro
      - rabbitmq3-data:/var/lib/rabbitmq
      - rabbitmq3-logs:/var/log/rabbitmq
    entrypoint: ["/bin/sh", "/usr/local/bin/cluster-entrypoint.sh"]
    depends_on:
      rabbitmq2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq4:
    image: rabbitmq:3-management
    restart: unless-stopped
    hostname: rabbitmq4
    environment:
      RABBITMQ_ERLANG_COOKIE: dds26-rabbitmq-cluster
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
      JOIN_CLUSTER_HOST: rabbitmq1
    volumes:
      - ./docker/rabbitmq/cluster-entrypoint.sh:/usr/local/bin/cluster-entrypoint.sh:ro
      - rabbitmq4-data:/var/lib/rabbitmq
      - rabbitmq4-logs:/var/log/rabbitmq
    entrypoint: ["/bin/sh", "/usr/local/bin/cluster-entrypoint.sh"]
    depends_on:
      rabbitmq3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq5:
    image: rabbitmq:3-management
    restart: unless-stopped
    hostname: rabbitmq5
    environment:
      RABBITMQ_ERLANG_COOKIE: dds26-rabbitmq-cluster
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
      JOIN_CLUSTER_HOST: rabbitmq1
    volumes:
      - ./docker/rabbitmq/cluster-entrypoint.sh:/usr/local/bin/cluster-entrypoint.sh:ro
      - rabbitmq5-data:/var/lib/rabbitmq
      - rabbitmq5-logs:/var/log/rabbitmq
    entrypoint: ["/bin/sh", "/usr/local/bin/cluster-entrypoint.sh"]
    depends_on:
      rabbitmq4:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  order-service:
    build:
      context: .
      dockerfile: order/Dockerfile
    image: order:latest
    restart: unless-stopped
    scale: 5
    environment:
      STOCK_SERVICE_URL: http://stock-service:5000
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    command: gunicorn -b 0.0.0.0:5000 -w 8 --threads 16 -k gthread -c gunicorn.conf.py --timeout 30 --graceful-timeout 20 --keep-alive 5 --max-requests 2000 --max-requests-jitter 200 --worker-tmp-dir /dev/shm --log-level=info app:app
    env_file:
      - env/order_redis.env
    depends_on:
      order-db:
        condition: service_started
      rabbitmq:
        condition: service_started
      rabbitmq1:
        condition: service_healthy
      rabbitmq2:
        condition: service_healthy
      rabbitmq3:
        condition: service_healthy
      rabbitmq4:
        condition: service_healthy
      rabbitmq5:
        condition: service_healthy
      orchestrator-service:
        condition: service_healthy

  order-db:
    image: redis:7.2-bookworm
    restart: unless-stopped
    command: redis-server --requirepass redis --maxmemory 512mb

  orchestrator-service:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    image: orchestrator:latest
    restart: unless-stopped
    scale: 5
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      COORDINATOR_REPLY_PREFETCH_COUNT: 64
      CHECKOUT_PROTOCOL: saga
    command: gunicorn -b 0.0.0.0:5000 -w 8 --threads 16 -k gthread -c orchestrator/gunicorn.conf.py --timeout 30 --graceful-timeout 20 --keep-alive 5 --max-requests 2000 --max-requests-jitter 200 --worker-tmp-dir /dev/shm --log-level=info orchestrator.app:app
    env_file:
      - env/orchestrator_redis.env
    depends_on:
      orchestrator-db:
        condition: service_started
      rabbitmq:
        condition: service_started
      rabbitmq1:
        condition: service_healthy
      rabbitmq2:
        condition: service_healthy
      rabbitmq3:
        condition: service_healthy
      rabbitmq4:
        condition: service_healthy
      rabbitmq5:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 10

  orchestrator-db:
    image: redis:7.2-bookworm
    restart: unless-stopped
    command: redis-server --requirepass redis --maxmemory 512mb

  stock-service:
    build:
      context: .
      dockerfile: stock/Dockerfile
    image: stock:latest
    restart: unless-stopped
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      PARTICIPANT_CONSUMER_PREFETCH_COUNT: 12
    command: gunicorn -b 0.0.0.0:5000 -w 8 --threads 16 -k gthread -c gunicorn.conf.py --timeout 30 --graceful-timeout 20 --keep-alive 5 --max-requests 2000 --max-requests-jitter 200 --worker-tmp-dir /dev/shm --log-level=info app:app
    env_file:
      - env/stock_redis.env
    depends_on:
      stock-db:
        condition: service_started
      rabbitmq:
        condition: service_started
      rabbitmq1:
        condition: service_healthy
      rabbitmq2:
        condition: service_healthy
      rabbitmq3:
        condition: service_healthy
      rabbitmq4:
        condition: service_healthy
      rabbitmq5:
        condition: service_healthy

  stock-db:
    image: redis:7.2-bookworm
    restart: unless-stopped
    command: redis-server --requirepass redis --maxmemory 512mb

  payment-service:
    build:
      context: .
      dockerfile: payment/Dockerfile
    image: payment:latest
    restart: unless-stopped
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      PARTICIPANT_CONSUMER_PREFETCH_COUNT: 12
    command: gunicorn -b 0.0.0.0:5000 -w 8 --threads 16 -k gthread -c gunicorn.conf.py --timeout 30 --graceful-timeout 20 --keep-alive 5 --max-requests 2000 --max-requests-jitter 200 --worker-tmp-dir /dev/shm --log-level=info app:app
    env_file:
      - env/payment_redis.env
    depends_on:
      payment-db:
        condition: service_started
      rabbitmq:
        condition: service_started
      rabbitmq1:
        condition: service_healthy
      rabbitmq2:
        condition: service_healthy
      rabbitmq3:
        condition: service_healthy
      rabbitmq4:
        condition: service_healthy
      rabbitmq5:
        condition: service_healthy

  payment-db:
    image: redis:7.2-bookworm
    restart: unless-stopped
    command: redis-server --requirepass redis --maxmemory 512mb

volumes:
  rabbitmq1-data:
  rabbitmq1-logs:
  rabbitmq2-data:
  rabbitmq2-logs:
  rabbitmq3-data:
  rabbitmq3-logs:
  rabbitmq4-data:
  rabbitmq4-logs:
  rabbitmq5-data:
  rabbitmq5-logs:
