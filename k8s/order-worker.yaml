apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-worker-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      component: order-worker
      role: worker
  template:
    metadata:
      labels:
        component: order-worker
        role: worker
    spec:
      containers:
        - name: order-worker
          image: order:latest
          imagePullPolicy: Never
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
          command: ["python"]
          args: ["workers/order_worker.py"]
          env:
            - name: REDIS_HOST
              value: redis-master
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              value: "redis"
            - name: REDIS_DB
              value: "0"
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              value: "dds"
            - name: RABBITMQ_PASSWORD
              value: "dds-rabbit"
            - name: RABBITMQ_VHOST
              value: "/"
            - name: RABBITMQ_QUEUE
              value: "order.command.q"
            - name: WORKER_QUEUES
              value: "checkout.command.q,order.command.q"
            - name: WORKER_PREFETCH_COUNT
              value: "1"
            - name: WORKER_MAX_RETRIES
              value: "5"
            - name: WORKER_RECONNECT_BACKOFF_MS
              value: "2000"
            - name: WORKER_DLX_EXCHANGE
              value: "order.dlx"
            - name: WORKER_DLX_ROUTING_KEY
              value: "order.dlq"
