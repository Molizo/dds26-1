apiVersion: apps/v1
kind: Deployment
metadata:
  name: dlq-replay-worker-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      component: dlq-replay-worker
      role: worker
  template:
    metadata:
      labels:
        component: dlq-replay-worker
        role: worker
    spec:
      containers:
        - name: dlq-replay-worker
          image: order:latest
          imagePullPolicy: Never
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
          command: ["python"]
          args: ["workers/dlq_replay_worker.py"]
          env:
            - name: REDIS_HOST
              value: redis-master
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              value: "redis"
            - name: REDIS_DB
              value: "0"
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              value: "dds"
            - name: RABBITMQ_PASSWORD
              value: "dds-rabbit"
            - name: RABBITMQ_VHOST
              value: "/"
            - name: DLQ_REPLAY_QUEUES
              value: "checkout.command.dlq,stock.command.dlq,payment.command.dlq,order.command.dlq"
            - name: DLQ_REPLAY_POLL_INTERVAL_MS
              value: "500"
            - name: DLQ_REPLAY_RATE_PER_SEC
              value: "20"
            - name: DLQ_REPLAY_MAX_ATTEMPTS
              value: "3"
            - name: DLQ_REPLAY_ATTEMPT_TTL_SEC
              value: "86400"
            - name: DLQ_REPLAY_LEADER_LOCK_TTL_MS
              value: "10000"
            - name: WORKER_RECONNECT_BACKOFF_MS
              value: "2000"
