apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-worker-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      component: payment-worker
      role: worker
  template:
    metadata:
      labels:
        component: payment-worker
        role: worker
    spec:
      containers:
        - name: payment-worker
          image: user:latest
          imagePullPolicy: Never
          resources:
            limits:
              memory: "512Mi"
              cpu: "1"
            requests:
              memory: "256Mi"
              cpu: "500m"
          command: ["python"]
          args: ["workers/payment_worker.py"]
          env:
            - name: REDIS_HOST
              value: redis-master
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              value: "redis"
            - name: REDIS_DB
              value: "0"
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              value: "dds"
            - name: RABBITMQ_PASSWORD
              value: "dds-rabbit"
            - name: RABBITMQ_VHOST
              value: "/"
            - name: RABBITMQ_CONNECTION
              value: "amqp://dds:dds-rabbit@rabbitmq.default.svc.cluster.local:5672/%2F"
            - name: RABBITMQ_QUEUE
              value: "payment.command.q"
            - name: WORKER_PREFETCH_COUNT
              value: "8"
            - name: WORKER_MAX_RETRIES
              value: "5"
            - name: WORKER_RECONNECT_BACKOFF_MS
              value: "2000"
            - name: WORKER_DLX_EXCHANGE
              value: "payment.dlx"
            - name: WORKER_DLX_ROUTING_KEY
              value: "payment.dlq"
