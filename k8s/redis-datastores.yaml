apiVersion: v1
kind: Service
metadata:
  name: order-db
spec:
  type: ClusterIP
  selector:
    app: order-db
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-db-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-db
  template:
    metadata:
      labels:
        app: order-db
    spec:
      containers:
        - name: order-db
          image: redis:7.2-bookworm
          imagePullPolicy: IfNotPresent
          command: ["redis-server", "--requirepass", "redis", "--maxmemory", "2gb", "--maxmemory-policy", "allkeys-lru", "--save", "", "--appendonly", "no", "--io-threads", "4", "--io-threads-do-reads", "yes"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "1500m"
              memory: "1Gi"
            limits:
              cpu: "4000m"
              memory: "4Gi"
---
